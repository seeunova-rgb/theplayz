<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Migrate Default Profiles</title>
<style>
  body { background:#111; color:#eee; font-family:monospace; padding:24px; max-width:700px; margin:auto; }
  h2   { color:#4fc3f7; }
  button {
    background:#1565c0; color:#fff; border:none; padding:10px 24px;
    border-radius:6px; font-size:15px; cursor:pointer; margin-top:12px;
  }
  button:disabled { background:#444; cursor:not-allowed; }
  #log {
    margin-top:20px; background:#1a1a1a; border:1px solid #333;
    border-radius:6px; padding:14px; max-height:500px; overflow-y:auto;
    font-size:13px; line-height:1.7;
  }
  .ok   { color:#66bb6a; }
  .skip { color:#888; }
  .err  { color:#ef5350; }
  .info { color:#4fc3f7; }
  #summary { margin-top:12px; font-size:14px; color:#ffd54f; font-weight:bold; }
</style>
</head>
<body>
<h2>🔧 Migrate Default Profiles</h2>
<p>เพิ่ม <code>account: "general"</code> และ <code>nameColor: "#ffffff"</code> ให้ user เก่าที่ยังไม่มีค่าเหล่านี้</p>
<p style="color:#ff9800">⚠ user ที่เป็น premium/dev อยู่แล้วจะไม่โดนแตะ</p>

<button id="btn-run" onclick="runMigration()">▶ เริ่ม Migration</button>

<div id="summary"></div>
<div id="log"></div>

<!-- ใช้ Firebase config เดียวกับ auth.js ของโปรเจกต์ -->
<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, child }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAyw3Tq72PnP3rR49_OKTkyxwjx-anq8W4",
  authDomain:        "theplayz-game.firebaseapp.com",
  databaseURL:       "https://theplayz-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "theplayz-game",
  storageBucket:     "theplayz-game.firebasestorage.app",
  messagingSenderId: "618323953801",
  appId:             "1:618323953801:web:52d52283ab5cbc03a3de58",
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.runMigration = async function () {
  const btn = document.getElementById('btn-run');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  document.getElementById('summary').textContent = '';

  log('📡 กำลังโหลด users ทั้งหมด...', 'info');

  let countOk = 0, countSkip = 0, countErr = 0;

  try {
    const snap = await get(ref(db, 'users'));

    if (!snap.exists()) {
      log('❌ ไม่พบข้อมูล users', 'err');
      btn.disabled = false;
      return;
    }

    const uids = [];
    snap.forEach(c => uids.push(c.key));
    log(`✅ พบ ${uids.length} users`, 'info');

    for (const uid of uids) {
      const profileSnap = await get(ref(db, `users/${uid}/profile`));
      const data = profileSnap.exists() ? profileSnap.val() : null;

      const hasAccount   = data?.account   != null;
      const hasNameColor = data?.nameColor  != null;

      if (hasAccount && hasNameColor) {
        log(`⬜ skip  ${uid.slice(0,10)}… (มีครบแล้ว)`, 'skip');
        countSkip++;
        continue;
      }

      try {
        if (!hasAccount)   await set(ref(db, `users/${uid}/profile/account`),   'general');
        if (!hasNameColor) await set(ref(db, `users/${uid}/profile/nameColor`),  { color: '#ffffff' });
        log(`✅ ok    ${uid.slice(0,10)}… (เพิ่ม:${!hasAccount?' account':''}${!hasNameColor?' nameColor':''})`, 'ok');
        countOk++;
      } catch(e) {
        log(`❌ error ${uid.slice(0,10)}… ${e.message}`, 'err');
        countErr++;
      }
    }

    document.getElementById('summary').textContent =
      `เสร็จแล้ว ✅  อัปเดต: ${countOk}  |  ข้าม: ${countSkip}  |  ผิดพลาด: ${countErr}`;

  } catch (e) {
    log(`❌ Fatal: ${e.message}`, 'err');
  }

  btn.disabled = false;
};
</script>
</body>
</html>
