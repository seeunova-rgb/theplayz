name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets
        run: npx cap copy android

      - name: Build Debug APK
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug \
            -x lint \
            -x checkDuplicateClasses \
            --warning-mode all \
            -Pandroid.jetifier.enabled=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: THEPLAYZ-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
